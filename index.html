
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                app: 'var(--color-bg-app)',
                sidebar: 'var(--color-bg-sidebar)',
                card: 'var(--color-bg-card)',
                'card-border': 'var(--color-border)',
                'hub-text': 'var(--color-text)',
                'hub-muted': 'var(--color-text-muted)',
              }
            }
          }
        }
    </script>
    <style>
        :root {
          --color-bg-app: transparent;
          --color-bg-sidebar: rgba(0, 34, 68, 0.8);
          --color-bg-card: rgba(0, 34, 68, 0.6);
          --color-border: rgba(59, 130, 246, 0.2);
          --color-text: #f1f5f9;
          --color-text-muted: #94a3b8;
          --sidebar-rgb: 0, 34, 68;
        }

        .light-theme {
          --color-bg-sidebar: rgba(255, 255, 255, 0.8);
          --color-bg-card: rgba(255, 255, 255, 0.6);
          --color-border: rgba(148, 163, 184, 0.2);
          --color-text: #0f172a;
          --color-text-muted: #64748b;
          --sidebar-rgb: 255, 255, 255;
        }

        body { 
          font-family: 'Inter', sans-serif; 
          margin: 0;
          padding: 0;
          height: 100vh;
          overflow: hidden;
          color: var(--color-text);
        }

        .theme-transition {
          transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                      color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                      border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Glassmorphism Base Styles */
        .bg-card {
          background-color: var(--color-bg-card);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
        }

        .bg-sidebar {
          background-color: var(--color-bg-sidebar);
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.7); }

        @keyframes taskEntry {
          from { opacity: 0; transform: translateY(15px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .animate-task-entry {
          animation: taskEntry 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>

</head>

</html>
